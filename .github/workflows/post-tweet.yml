name: Post Tabii tweets

on:
  schedule:
    # UTC times for 00:30, 08:30, 21:30 in UTC+8.
    - cron: "30 16,0,13 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # OAuth1 tokens do not rotate, so they are safer for stateless GitHub Actions.
      TWITTER_AUTH_MODE: oauth1
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      LLM_PROVIDER: template
      POST_TIMES: 00:30,08:30,21:30
      TWEET_TOPICS: too many browser tabs,I'll read this later,research rabbit hole,ADHD browser chaos,designer inspiration hoarding,student research panic,AI workflow but messy browser,Chrome eating memory
      TREND_KEYWORDS: AI workflow,deadline panic,study setup,designer problems,procrastination,Chrome tabs,research rabbit hole,too many tabs

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post one tweet
        run: python post_tweet.py --once
